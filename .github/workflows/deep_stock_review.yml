name: A股盘后深度复盘

on:
  workflow_dispatch:
    inputs:
      stock_code:
        description: "股票代码；留空则按 STOCK_LIST 工作日轮换"
        required: false
        default: ""
      trade_date:
        description: "分析日期 YYYY-MM-DD；留空则使用当天"
        required: false
        default: ""
      no_notify:
        description: "只生成报告，不推送飞书"
        required: false
        default: false
        type: boolean

jobs:
  deep-review:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      TZ: Asia/Shanghai

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install TradingAgents-Astock
        run: |
          pip install --upgrade pip
          git clone --depth 1 https://github.com/simonlin1212/TradingAgents-astock.git /tmp/TradingAgents-astock
          python - <<'PY'
          from pathlib import Path
          path = Path("/tmp/TradingAgents-astock/pyproject.toml")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              'Upstream = "https://github.com/TauricResearch/TradingAgents"\ndependencies = [',
              'Upstream = "https://github.com/TauricResearch/TradingAgents"\n\n[project]\ndependencies = [',
          )
          path.write_text(text, encoding="utf-8")
          PY
          pip install /tmp/TradingAgents-astock

      - name: Run deep stock review
        env:
          STOCK_LIST: ${{ vars.STOCK_LIST || secrets.STOCK_LIST }}
          DEEP_REVIEW_LLM_PROVIDER: ${{ vars.DEEP_REVIEW_LLM_PROVIDER || secrets.DEEP_REVIEW_LLM_PROVIDER || 'deepseek' }}
          DEEP_REVIEW_QUICK_MODEL: ${{ vars.DEEP_REVIEW_QUICK_MODEL || secrets.DEEP_REVIEW_QUICK_MODEL }}
          DEEP_REVIEW_DEEP_MODEL: ${{ vars.DEEP_REVIEW_DEEP_MODEL || secrets.DEEP_REVIEW_DEEP_MODEL }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY || secrets.LLM_DEEPSEEK_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY || secrets.GEMINI_API_KEY || secrets.GEMINI_API_KEYS }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          ZHIPU_API_KEY: ${{ secrets.ZHIPU_API_KEY }}
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_DEEP_REVIEW_WEBHOOK_URL || secrets.FEISHU_TRADING_WEBHOOK_URL || secrets.FEISHU_WEBHOOK_URL }}
          FEISHU_WEBHOOK_SECRET: ${{ secrets.FEISHU_DEEP_REVIEW_WEBHOOK_SECRET || secrets.FEISHU_TRADING_WEBHOOK_SECRET || secrets.FEISHU_WEBHOOK_SECRET }}
          FEISHU_WEBHOOK_KEYWORD: ${{ vars.FEISHU_DEEP_REVIEW_WEBHOOK_KEYWORD || secrets.FEISHU_DEEP_REVIEW_WEBHOOK_KEYWORD || vars.FEISHU_TRADING_WEBHOOK_KEYWORD || secrets.FEISHU_TRADING_WEBHOOK_KEYWORD || vars.FEISHU_WEBHOOK_KEYWORD || secrets.FEISHU_WEBHOOK_KEYWORD }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.stock_code }}" ]; then
            ARGS="$ARGS --stock-code ${{ github.event.inputs.stock_code }}"
          fi
          if [ -n "${{ github.event.inputs.trade_date }}" ]; then
            ARGS="$ARGS --trade-date ${{ github.event.inputs.trade_date }}"
          fi
          if [ "${{ github.event.inputs.no_notify }}" = "true" ]; then
            ARGS="$ARGS --no-notify"
          fi
          python scripts/deep_stock_review.py $ARGS

      - name: Upload deep review artifacts
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: deep-stock-review-${{ github.run_number }}
          path: |
            reports/deep_stock_review/
          retention-days: 30
